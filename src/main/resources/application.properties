spring.application.name=VaultIQ

# === MySQL Database Configuration ===
spring.datasource.url=jdbc:mysql://localhost:3306/vaultiq
spring.datasource.username=root
spring.datasource.password=shree123

# === Hibernate / JPA ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true


# Spring Mail Configuration for Gmail
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${SMTP.username}
spring.mail.password=${SMTP.password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=no-reply@atharvs.online


#spring.mvc.servlet.path=/api/v1.0
jwt.secret=${JWT.SECRETE.KEY}
jwt.expiration=86400000

vaultIQ.fronted.url =${vaultIQ.FRONTEND.URL}
vaultiq.activation.url = ${vaultIQ.BACKEND.URL}
